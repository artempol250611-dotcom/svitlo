<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Графік світла</title>
    <script>
        async function loadData() {
            const res = await fetch("/data");
            const data = await res.json();
            const container = document.getElementById("queues");
            container.innerHTML = "";

            const now = new Date();
            const nowStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            for (let q in data) {
                const info = data[q];
                const status = info === "on" ? "🟢" : "🔴";
                let periodsHTML = "";
                for (let p of info.periods) {
                    let cls = (p.start <= nowStr && nowStr <= p.end) ? "current" : "";
                    periodsHTML += `<div class="${cls}">${p.start} - ${p.end}</div>`;
                }
                container.innerHTML += `<div class="card">
                    <h2>Черга ${q} ${status}</h2>
                    ${periodsHTML}
                </div>`;
            }
        }
        setInterval(loadData, 5000);
    </script>
    <style>
        body { font-family: Arial; text-align:center; background:#0f172a; color:white; }
        .card { display:inline
